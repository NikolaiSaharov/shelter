{% extends 'base.html' %}
{% block title %}Создать характер — Анималити{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Создать характер животного</h2>
    <a href="{% url 'character_list' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Назад к списку
    </a>
  </div>

  <div class="card shadow-sm" style="border-radius:16px;">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
          <label class="form-label fw-semibold">Название характера <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="character_name" value="{{ character_name|default:'' }}" required 
                 placeholder="Например: Дружелюбный, Активный">
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Описание</label>
          <textarea class="form-control" name="description" rows="3" 
                    placeholder="Краткое описание характера (необязательно)">{{ description|default:'' }}</textarea>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a href="{% url 'character_list' %}" class="btn btn-outline-secondary">Отмена</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Создать характер
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
