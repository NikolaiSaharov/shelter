{% extends 'base.html' %}
{% block title %}Создать приют — Анималити{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Создать приют</h2>
    <a href="{% url 'shelter_list' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Назад к списку
    </a>
  </div>

  <div class="card shadow-sm" style="border-radius:16px;">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">Название приюта <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="shelter_name" value="{{ shelter_name|default:'' }}" required 
                   placeholder="Например: Приют 'Надежда'">
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Адрес</label>
            <input type="text" class="form-control" name="address" value="{{ address|default:'' }}" 
                   placeholder="Например: г. Москва, ул. Ленина, д. 10">
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Телефон</label>
            <input type="text" class="form-control" name="phone" id="shelterPhone" inputmode="tel" autocomplete="tel"
                   maxlength="22" value="{{ phone|default:'' }}"
                   placeholder="+7 (495) 123-45-67">
            <div class="form-text">Вводите цифры — номер оформится автоматически. Поле можно оставить пустым.</div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" name="email" id="shelterEmail" autocomplete="email"
                   value="{{ email|default:'' }}" placeholder="shelter@example.com">
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Описание</label>
            <textarea class="form-control" name="description" rows="3" 
                      placeholder="Краткое описание приюта...">{{ description|default:'' }}</textarea>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="is_active" id="is_active" 
                     {% if is_active %}checked{% endif %}>
              <label class="form-check-label" for="is_active">
                Приют активен
              </label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <a href="{% url 'shelter_list' %}" class="btn btn-outline-secondary">Отмена</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Создать приют
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
(function () {
  var phoneEl = document.getElementById('shelterPhone');
  if (!phoneEl) return;

  function formatRuPhoneInput() {
    var d = phoneEl.value.replace(/\D/g, '');
    if (d.charAt(0) === '8') d = '7' + d.slice(1);
    if (d.length && d.charAt(0) !== '7') d = '7' + d;
    d = d.slice(0, 11);
    if (!d.length) {
      phoneEl.value = '';
      return;
    }
    var s = '+7';
    var p1 = d.slice(1, 4);
    s += ' (' + p1;
    if (d.length >= 4) s += ')';
    if (d.length > 4) s += ' ' + d.slice(4, 7);
    if (d.length > 7) s += '-' + d.slice(7, 9);
    if (d.length > 9) s += '-' + d.slice(9, 11);
    phoneEl.value = s;
  }

  phoneEl.addEventListener('input', formatRuPhoneInput);
  phoneEl.addEventListener('blur', formatRuPhoneInput);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', formatRuPhoneInput);
  } else {
    formatRuPhoneInput();
  }
})();
</script>
{% endblock %}
