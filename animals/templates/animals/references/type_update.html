{% extends 'base.html' %}
{% block title %}Редактировать тип — Анималити{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Редактировать тип: {{ animal_type.type_name }}</h2>
    <a href="{% url 'animal_type_list' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Назад к списку
    </a>
  </div>

  <div class="card shadow-sm" style="border-radius:16px;">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
          <label class="form-label fw-semibold">Название типа <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="type_name" value="{{ animal_type.type_name }}" required>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a href="{% url 'animal_type_list' %}" class="btn btn-outline-secondary">Отмена</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Сохранить изменения
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
